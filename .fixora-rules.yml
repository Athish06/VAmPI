rules:
- id: fixora-wrapper-get-user
  patterns:
  - pattern-inside: "def get_user(...):\n  ..."
  - pattern-either:
    - pattern: db.session.execute(...)
    - pattern: $OBJ.execute(...)
    - pattern: execute(...)
  message: '### Alert: SQL Injection in `get_user()`


    **Mechanism:**

    This function takes untrusted input and passes it directly into `db.session.execute`
    without adequate validation or sanitization.


    **Example Attack Vector:**

    ```python\nget_user('' OR 1=1 --'')\n```


    **How The Attack Works:**

    The payload injects a malicious SQL statement that always evaluates to true, allowing
    an attacker to bypass authentication.


    **Data at Risk (Impact):**

    Can leak the entire database, bypass authentication, or destroy critical records.


    **AI Analysis:**

    User input concatenated directly into SQL query.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: SQL Injection
    confidence: HIGH
    wrapper_defined_in: models/user_model.py
    wraps:
    - db.session.execute
    modules_used:
    - sqlalchemy
    cwe:
    - CWE-89
    owasp:
    - A03:2021
- id: fixora-wrapper-update-password
  patterns:
  - pattern-inside: "def update_password(...):\n  ..."
  - pattern-either:
    - pattern: User.query.filter_by(...)
    - pattern: $OBJ.filter_by(...)
    - pattern: filter_by(...)
    - pattern: db.session.commit(...)
    - pattern: $OBJ.commit(...)
    - pattern: commit(...)
  message: '### Alert: IDOR / Broken Access Control in `update_password()`


    **Mechanism:**

    This function takes untrusted input and passes it directly into `User.query.filter_by,
    db.session.commit` without adequate validation or sanitization.


    **Example Attack Vector:**

    ```python\nupdate_password(''another_user'')\n```


    **How The Attack Works:**

    The attacker can update the password of any user without proper authorization.


    **Data at Risk (Impact):**

    Allows attackers to view, edit, or delete private data belonging to other users.


    **AI Analysis:**

    Lack of proper authorization checks allows an attacker to update another user''s
    password.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: IDOR / Broken Access Control
    confidence: HIGH
    wrapper_defined_in: api_views/users.py
    wraps:
    - User.query.filter_by
    - db.session.commit
    modules_used:
    - flask
    - models
- id: fixora-wrapper-register-user
  patterns:
  - pattern-inside: "def register_user(...):\n  ..."
  - pattern-either:
    - pattern: User.query.filter_by(...)
    - pattern: $OBJ.filter_by(...)
    - pattern: filter_by(...)
    - pattern: db.session.add(...)
    - pattern: $OBJ.add(...)
    - pattern: add(...)
    - pattern: db.session.commit(...)
    - pattern: $OBJ.commit(...)
    - pattern: commit(...)
  message: '### Alert: Business Logic Flaw in `register_user()`


    **Mechanism:**

    This function takes untrusted input and passes it directly into `User.query.filter_by,
    db.session.add, db.session.commit` without adequate validation or sanitization.


    **Example Attack Vector:**

    ```python\nregister_user({''username'': ''new_user'', ''password'': ''password'',
    ''email'': ''email@example.com'', ''admin'': True})\n```


    **How The Attack Works:**

    The attacker can exploit the lack of proper validation to gain admin privileges.


    **Data at Risk (Impact):**

    Can allow attackers to bypass intended application logic.


    **AI Analysis:**

    An attacker can register as an admin by including ''admin'': True in the request
    body.'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Business Logic Flaw
    confidence: MEDIUM
    wrapper_defined_in: api_views/users.py
    wraps:
    - User.query.filter_by
    - db.session.add
    - db.session.commit
    modules_used:
    - flask
    - models
    - jsonschema

rules:
- id: fixora-wrapper-get-by-title
  pattern: "def get_by_title(...):\n  ..."
  message: 'Vulnerable function ''get_by_title()'' wraps Book.query.filter_by. Vulnerability:
    Broken Object Level Authorization. User-controlled data is passed to a query without
    proper authorization checks.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Broken Object Level Authorization
    confidence: HIGH
    wrapper_defined_in: api_views/books.py
    wraps:
    - Book.query.filter_by
    modules_used:
    - models
    - flask
- id: fixora-wrapper-register-user
  pattern: "def register_user(...):\n  ..."
  message: 'Vulnerable function ''register_user()'' wraps User. Vulnerability: User
    is possible to define if she/he wants to be an admin. User-controlled data is
    used to determine admin status.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: User is possible to define if she/he wants to be an admin
    confidence: HIGH
    wrapper_defined_in: api_views/users.py
    wraps:
    - User
    modules_used:
    - jsonschema
    - models
    - config
    - flask
- id: fixora-wrapper-login-user
  pattern: "def login_user(...):\n  ..."
  message: 'Vulnerable function ''login_user()'' wraps User.query.filter_by. Vulnerability:
    Password Enumeration. Different error messages are returned for existing and non-existing
    users.'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Password Enumeration
    confidence: MEDIUM
    wrapper_defined_in: api_views/users.py
    wraps:
    - User.query.filter_by
    modules_used:
    - jsonschema
    - models
    - flask
- id: fixora-wrapper-update-email
  pattern: "def update_email(...):\n  ..."
  message: 'Vulnerable function ''update_email()'' wraps re.search. Vulnerability:
    Regex DoS. User-controlled data is passed to a regular expression without proper
    validation.'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Regex DoS
    confidence: MEDIUM
    wrapper_defined_in: api_views/users.py
    wraps:
    - re.search
    modules_used:
    - re
    - config
    - flask
    - jsonschema
    - models
- id: fixora-wrapper-update-password
  pattern: "def update_password(...):\n  ..."
  message: 'Vulnerable function ''update_password()'' wraps User.query.filter_by.
    Vulnerability: Unauthorized update of password of another user. User-controlled
    data is used to update the password of another user.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Unauthorized update of password of another user
    confidence: HIGH
    wrapper_defined_in: api_views/users.py
    wraps:
    - User.query.filter_by
    modules_used:
    - config
    - models
    - flask
- id: fixora-wrapper-get-user
  pattern: "def get_user(...):\n  ..."
  message: 'Vulnerable function ''get_user()'' wraps db.session.execute. Vulnerability:
    SQLi Injection. User-controlled data is concatenated directly into a SQL query.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: SQLi Injection
    confidence: HIGH
    wrapper_defined_in: models/user_model.py
    wraps:
    - db.session.execute
    modules_used:
    - config
    - sqlalchemy

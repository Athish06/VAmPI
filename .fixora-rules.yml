rules:
- id: fixora-wrapper-get-user
  pattern: "def get_user(...):\n  ..."
  message: 'Vulnerable function ''get_user()'' wraps db.session.execute. Vulnerability:
    SQL Injection. User input concatenated directly into SQL query'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: SQL Injection
    confidence: HIGH
    wrapper_defined_in: models/user_model.py
    wraps:
    - db.session.execute
    modules_used:
    - sqlalchemy
    cwe:
    - CWE-89
    owasp:
    - A03:2021
- id: fixora-wrapper-register-user
  pattern: "def register_user(...):\n  ..."
  message: 'Vulnerable function ''register_user()'' wraps User.query.filter_by. Vulnerability:
    IDOR / Broken Access Control. User can define if they want to be an admin'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: IDOR / Broken Access Control
    confidence: MEDIUM
    wrapper_defined_in: api_views/users.py
    wraps:
    - User.query.filter_by
    modules_used:
    - flask
    - config
    - jsonschema
    - models

rules:
- id: fixora-wrapper-get-user
  pattern: "def get_user(...):\n  ..."
  message: 'Vulnerable function ''get_user()'' wraps db.session.execute, text. Vulnerability:
    SQL Injection. User input is directly concatenated into SQL query'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: SQL Injection
    confidence: HIGH
    wrapper_defined_in: models/user_model.py
    wraps:
    - db.session.execute
    - text
    modules_used:
    - sqlalchemy
    - config
    cwe:
    - CWE-89
    owasp:
    - A03:2021
- id: fixora-wrapper-get-by-title
  pattern: "def get_by_title(...):\n  ..."
  message: 'Vulnerable function ''get_by_title()'' wraps token_validator, request.headers.get,
    Response, error_message_helper, Book.query.filter_by, json.dumps, User.query.filter_by.
    Vulnerability: IDOR / Broken Access Control. No proper authorization checks are
    performed'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: IDOR / Broken Access Control
    confidence: MEDIUM
    wrapper_defined_in: api_views/books.py
    wraps:
    - token_validator
    - request.headers.get
    - Response
    - error_message_helper
    - Book.query.filter_by
    - json.dumps
    - User.query.filter_by
    modules_used:
    - models
    - api_views
    - flask

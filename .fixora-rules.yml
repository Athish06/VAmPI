rules:
- id: fixora-wrapper-get-user
  pattern: "def get_user(...):\n  ..."
  message: 'Vulnerable function ''get_user()'' wraps db.session.execute. Vulnerability:
    SQL Injection. User input is directly concatenated into a SQL query.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: SQL Injection
    confidence: HIGH
    wrapper_defined_in: models/user_model.py
    wraps:
    - db.session.execute
    modules_used:
    - sqlalchemy
    cwe:
    - CWE-89
    owasp:
    - A03:2021
- id: fixora-wrapper-update-email
  pattern: "def update_email(...):\n  ..."
  message: 'Vulnerable function ''update_email()'' wraps re.search. Vulnerability:
    Regex Denial of Service. User input is used in a regular expression, which can
    cause a denial of service.'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Regex Denial of Service
    confidence: MEDIUM
    wrapper_defined_in: api_views/users.py
    wraps:
    - re.search
    modules_used:
    - re
- id: fixora-wrapper-register-user
  pattern: "def register_user(...):\n  ..."
  message: 'Vulnerable function ''register_user()'' wraps User. Vulnerability: Privilege
    Escalation. User input is used to determine if a user should be an admin.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Privilege Escalation
    confidence: HIGH
    wrapper_defined_in: api_views/users.py
    wraps:
    - User
    modules_used:
    - models
- id: fixora-wrapper-update-password
  pattern: "def update_password(...):\n  ..."
  message: 'Vulnerable function ''update_password()'' wraps User.query.filter_by.
    Vulnerability: Unauthorized Update. User input is used to update the password
    of another user.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Unauthorized Update
    confidence: HIGH
    wrapper_defined_in: api_views/users.py
    wraps:
    - User.query.filter_by
    modules_used:
    - models
- id: fixora-wrapper-login-user
  pattern: "def login_user(...):\n  ..."
  message: 'Vulnerable function ''login_user()'' wraps User.query.filter_by. Vulnerability:
    Password Enumeration. User input is used to determine if a password is correct,
    which can be used to enumerate passwords.'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Password Enumeration
    confidence: MEDIUM
    wrapper_defined_in: api_views/users.py
    wraps:
    - User.query.filter_by
    modules_used:
    - models
- id: fixora-wrapper-get-by-title
  pattern: "def get_by_title(...):\n  ..."
  message: 'Vulnerable function ''get_by_title()'' wraps Book.query.filter_by. Vulnerability:
    Broken Object Level Authorization. User input is used to access books without
    proper authorization.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Broken Object Level Authorization
    confidence: HIGH
    wrapper_defined_in: api_views/books.py
    wraps:
    - Book.query.filter_by
    modules_used:
    - models

rules:
- id: fixora-wrapper-get-by-title
  pattern: "def get_by_title(...):\n  ..."
  message: 'Vulnerable function ''get_by_title()'' wraps Book.query.filter_by. Vulnerability:
    Broken Object Level Authorization. User input is used directly in the query without
    proper authorization checks'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Broken Object Level Authorization
    confidence: HIGH
    wrapper_defined_in: api_views/books.py
    wraps:
    - Book.query.filter_by
    modules_used:
    - models
    - flask
- id: fixora-wrapper-register-user
  pattern: "def register_user(...):\n  ..."
  message: 'Vulnerable function ''register_user()'' wraps User.query.filter_by, db.session.add,
    db.session.commit. Vulnerability: Privilege Escalation. User input is used to
    set the admin privilege without proper validation'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Privilege Escalation
    confidence: HIGH
    wrapper_defined_in: api_views/users.py
    wraps:
    - User.query.filter_by
    - db.session.add
    - db.session.commit
    modules_used:
    - models
    - jsonschema
    - flask
- id: fixora-wrapper-update-email
  pattern: "def update_email(...):\n  ..."
  message: 'Vulnerable function ''update_email()'' wraps re.search. Vulnerability:
    Regex Denial of Service. User input is used in a regular expression without proper
    validation'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Regex Denial of Service
    confidence: MEDIUM
    wrapper_defined_in: api_views/users.py
    wraps:
    - re.search
    modules_used:
    - re
    - flask
- id: fixora-wrapper-update-password
  pattern: "def update_password(...):\n  ..."
  message: 'Vulnerable function ''update_password()'' wraps User.query.filter_by,
    db.session.commit. Vulnerability: Unauthorized Password Update. User input is
    used to update the password without proper authorization checks'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Unauthorized Password Update
    confidence: HIGH
    wrapper_defined_in: api_views/users.py
    wraps:
    - User.query.filter_by
    - db.session.commit
    modules_used:
    - models
    - flask
- id: fixora-wrapper-login-user
  pattern: "def login_user(...):\n  ..."
  message: 'Vulnerable function ''login_user()'' wraps User.query.filter_by. Vulnerability:
    Password Enumeration. User input is used to enumerate passwords without proper
    rate limiting'
  severity: WARNING
  languages:
  - python
